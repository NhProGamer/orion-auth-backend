# Development defaults — DO NOT deploy this file as-is to production.
# Production deployments MUST override the following via ORION_* env vars:
#   - ORION_SERVER_MODE=release
#   - ORION_DATABASE_PASSWORD=<strong password>
#   - ORION_AUTH_HMAC_SECRET_ENCRYPTION_KEY=<base64 AES-256>
#   - ORION_PAIRWISE_SALT=<32 random bytes hex>
#   - ORION_ISSUER=https://your-public-domain
#   - ORION_SMTP_TLS=true
# Optional (soft warnings only — set when the DB or SMTP is reachable
# from outside a private network):
#   - ORION_DATABASE_SSLMODE=require (skip when the DB lives in the same
#     docker-compose / kubernetes pod network)
# The Config.Validate() boot check refuses to start in release mode if any
# of the MUST-override values is still set to its development placeholder.

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug" # debug | release | test (debug = dev default; set ORION_SERVER_MODE=release in prod)

database:
  host: "localhost"
  port: 5432
  user: "orionauth"
  password: "orionauth"
  name: "orionauth"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: "5m"

auth:
  access_token_ttl: "1h"
  refresh_token_ttl: "24h"
  session_ttl: "720h" # 30 days
  auth_code_ttl: "60s"
  device_code_ttl: "10m"
  password_min_length: 8
  max_failed_attempts: 5
  lockout_duration: "15m"
  # Base64-encoded AES-256 (32 bytes) used to seal per-client HMAC keys
  # (client_secret_jwt) and federation client_secrets at rest. Override at
  # runtime with ORION_AUTH_HMAC_SECRET_ENCRYPTION_KEY. Empty disables
  # both features with a startup warning.
  hmac_secret_encryption_key: ""

argon2:
  memory: 65536 # 64MB
  iterations: 3
  parallelism: 4
  salt_length: 16
  key_length: 32

cors:
  allowed_origins:
    - "http://localhost:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PATCH"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"
  max_age: 3600

smtp:
  host: "localhost"
  port: 1025
  username: ""
  password: ""
  from: "noreply@orionauth.local"
  from_name: "orion-auth-backend"
  # DEV ONLY: TLS disabled because this targets a local MailHog instance.
  # Production deployments MUST set ORION_SMTP_TLS=true; Config.Validate
  # emits a startup warning when TLS=false is paired with a non-loopback
  # host (see config/validate.go).
  tls: false

webauthn:
  rp_display_name: "OrionAuth"
  rp_id: "localhost"
  rp_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

account:
  reauth_token_ttl: "10m"
  email_change_token_ttl: "1h"
  deletion_grace_period: "168h" # 7d
  passkey_challenge_ttl: "5m"

issuer: "http://localhost:8080"
pairwise_salt: "change-me-in-production"
