on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: git.nhsoul.fr
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}   # ← token avec packages:write

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            git.nhsoul.fr/nhpro/orion-auth-backend:${{ github.ref_name }}
            git.nhsoul.fr/nhpro/orion-auth-backend:latest