name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for the image'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Install system dependencies
        run: apk add --no-cache git docker

      - name: Checkout
        run: |
          git clone https://oauth2:${{ github.token }}@git.nhsoul.fr/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.nhsoul.fr -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || 'latest' }}"
          docker build -t git.nhsoul.fr/nhpro/orion-auth-backend:${TAG} -t git.nhsoul.fr/nhpro/orion-auth-backend:latest .
          docker push git.nhsoul.fr/nhpro/orion-auth-backend:${TAG}
          docker push git.nhsoul.fr/nhpro/orion-auth-backend:latest
