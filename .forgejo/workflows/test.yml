name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Pin swag so 'latest' bumping (currently to v2.0.0-rc) cannot
  # silently break the build, and so the swag binary cache key
  # below stays stable.
  SWAG_VERSION: v1.16.6

jobs:
  test:
    runs-on: docker
    container:
      image: golang:1.25-alpine
    steps:
      - name: Install system dependencies
        # nodejs is required by actions/cache@v4 (and any other JS
        # action); golang:1.25-alpine doesn't ship it. Must be
        # installed BEFORE the first JS action runs.
        run: apk add --no-cache git build-base nodejs

      - name: Checkout
        run: |
          git clone https://oauth2:${{ github.token }}@git.nhsoul.fr/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      # Cache the Go module download cache + per-package build cache.
      # Keyed on go.sum so a dependency bump invalidates; restore-keys
      # lets a partial match (same OS, older go.sum) reuse most of
      # the cache.
      - name: Cache Go modules + build cache
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Cache the swag binary keyed on its pinned version.
      - name: Cache swag binary
        id: swag-cache
        uses: actions/cache@v4
        with:
          path: /go/bin/swag
          key: swag-${{ env.SWAG_VERSION }}

      - name: Install swag (cache miss only)
        if: steps.swag-cache.outputs.cache-hit != 'true'
        run: go install github.com/swaggo/swag/cmd/swag@${{ env.SWAG_VERSION }}

      - name: Download Go modules
        run: go mod download

      - name: Generate swagger docs
        run: swag init -g main.go -o docs/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
