name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Pin swag so we don't re-resolve "latest" on every run and so the
  # cache key (below) is stable.
  SWAG_VERSION: v1.16.6

jobs:
  test:
    runs-on: docker
    container:
      image: golang:1.25-alpine
    steps:
      - name: Install system dependencies
        run: apk add --no-cache git build-base

      - name: Checkout
        run: |
          git clone https://oauth2:${{ github.token }}@git.nhsoul.fr/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      # Cache the Go module download cache + build cache. Keyed on go.sum
      # so a dependency bump invalidates; restore-keys lets a partial
      # match (same OS, different go.sum) reuse most of the cache.
      - name: Cache Go modules + build cache
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Cache the swag binary keyed on its pinned version. Cheap, but
      # saves ~30s per run.
      - name: Cache swag binary
        id: swag-cache
        uses: actions/cache@v4
        with:
          path: /go/bin/swag
          key: swag-${{ env.SWAG_VERSION }}

      - name: Install swag (cache miss only)
        if: steps.swag-cache.outputs.cache-hit != 'true'
        run: go install github.com/swaggo/swag/cmd/swag@${{ env.SWAG_VERSION }}

      - name: Download Go modules
        run: go mod download

      - name: Generate swagger docs
        run: swag init -g main.go -o docs/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
