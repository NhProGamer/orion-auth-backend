name: Tests

on:
  push:
    branches: [master]
    tags: ['**']
  pull_request:
    branches: [master]

env:
  # Pin swag so 'latest' bumping (currently to v2.0.0-rc) cannot
  # silently break the build.
  SWAG_VERSION: v1.16.6

jobs:
  test:
    runs-on: docker
    container:
      image: golang:1.25-alpine
    steps:
      - name: Install system dependencies
        run: apk add --no-cache git build-base

      - name: Checkout
        run: |
          git clone https://oauth2:${{ github.token }}@git.nhsoul.fr/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Download Go modules
        run: go mod download

      - name: Generate swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@${{ env.SWAG_VERSION }}
          swag init -g main.go -o docs/

      - name: Vet
        run: go vet ./...

      - name: gofmt
        # Fail the build on unformatted files. Prevents future
        # drift now that c707ffe normalised the whole tree.
        run: |
          dirty=$(gofmt -l .)
          if [ -n "$dirty" ]; then
            echo "gofmt: the following files need formatting:"
            echo "$dirty"
            exit 1
          fi

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # Reject tag pushes that do not follow the SemVer policy documented in
  # VERSIONING.md. The legacy '-hf*' / '-pre*' / '-b*' / '-pr*' suffixes
  # were remapped in v0.24.0 and must never come back.
  tag-format:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: docker
    container:
      image: alpine:3.20
    steps:
      - name: Reject malformed tags
        run: |
          tag="${{ github.ref_name }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Tag '$tag' violates the SemVer policy."
            echo "Expected vX.Y.Z or vX.Y.Z-rc.N. See VERSIONING.md."
            exit 1
          fi
          echo "Tag '$tag' is well-formed."
