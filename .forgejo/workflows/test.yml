name: Tests

on:
  push:
    branches: [master]
    tags: ['**']
  pull_request:
    branches: [master]

env:
  # Pin swag so 'latest' bumping (currently to v2.0.0-rc) cannot
  # silently break the build.
  SWAG_VERSION: v1.16.6

jobs:
  test:
    runs-on: docker
    # Pre-warmed CI base image: ships swag + a /go/pkg/mod that already
    # contains every dep recorded in go.sum at last image build time.
    # See Dockerfile.ci and .forgejo/workflows/ci-base-image.yml.
    container:
      image: git.nhsoul.fr/nhpro/orion-auth-backend-ci:latest
    steps:
      - name: Checkout
        run: |
          git clone https://oauth2:${{ github.token }}@git.nhsoul.fr/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      # Per-PR caches on top of the base image:
      # - /go/pkg/mod covers deps added since the image's go.sum.
      # - /root/.cache/go-build is the incremental compilation cache;
      #   restoring it cuts `go test` recompilation by ~30s when the
      #   touched package set is small.
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: /go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: /root/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('go.sum', '**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Resolve modules
        # No-op when the cache + base image already cover everything.
        run: go mod download

      - name: Generate swagger docs
        run: swag init -g main.go -o docs/

      - name: Vet
        run: go vet ./...

      - name: gofmt
        # Fail the build on unformatted files. Prevents future
        # drift now that c707ffe normalised the whole tree.
        run: |
          dirty=$(gofmt -l .)
          if [ -n "$dirty" ]; then
            echo "gofmt: the following files need formatting:"
            echo "$dirty"
            exit 1
          fi

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # Reject tag pushes that do not follow the SemVer policy documented in
  # VERSIONING.md. The legacy '-hf*' / '-pre*' / '-b*' / '-pr*' suffixes
  # were remapped in v0.24.0 and must never come back.
  tag-format:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: docker
    container:
      image: alpine:3.20
    steps:
      - name: Reject malformed tags
        run: |
          tag="${{ github.ref_name }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "Tag '$tag' violates the SemVer policy."
            echo "Expected vX.Y.Z or vX.Y.Z-rc.N. See VERSIONING.md."
            exit 1
          fi
          echo "Tag '$tag' is well-formed."
